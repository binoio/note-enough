name: NoteEnough
options:
  bundleIdPrefix: io.bino
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: 43L352U8Y8
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: ""
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"

targets:
  NoteEnough:
    type: application
    platform: iOS
    devices: [iPad]
    sources:
      - NoteEnough
    settings:
      base:
        TARGETED_DEVICE_FAMILY: 2
        PRODUCT_BUNDLE_IDENTIFIER: io.bino.noteenough
        INFOPLIST_KEY_CFBundleDisplayName: "Note Enough"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
    scheme:
      testTargets:
        - NoteEnoughTests
        - NoteEnoughUITests

  NoteEnoughTests:
    type: bundle.unit-test
    platform: iOS
    devices: [iPad]
    sources:
      - NoteEnoughTests
    dependencies:
      - target: NoteEnough
    settings:
      base:
        TARGETED_DEVICE_FAMILY: 2
        PRODUCT_BUNDLE_IDENTIFIER: io.bino.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "YES"

  NoteEnoughUITests:
    type: bundle.ui-testing
    platform: iOS
    devices: [iPad]
    sources:
      - NoteEnoughUITests
    dependencies:
      - target: NoteEnough
    settings:
      base:
        TARGETED_DEVICE_FAMILY: 2
        PRODUCT_BUNDLE_IDENTIFIER: io.bino.uitests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "YES"
